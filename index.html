<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라마 라마(Llama Llama) 점수 계산기</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --card-bg: #ffffff;
            --primary: #d97757;
            --primary-hover: #c26143;
            --text-main: #333333;
            --border-color: #e2d8c3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        
        .section { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .section-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px dashed var(--border-color); padding-bottom: 10px; color: var(--primary); }

        /* Hand Input */
        .hand-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .card-counter { display: flex; flex-direction: column; align-items: center; background: #fdf6e3; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 80px; }
        .card-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        .controls { display: flex; align-items: center; gap: 8px; }
        .btn-ctrl { background: #e2d8c3; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-ctrl:hover { background: #d4c7ad; }
        .count-val { font-size: 1.1rem; font-weight: bold; width: 16px; text-align: center; }
        
        .total-tracker { text-align: center; margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        .total-tracker.error { color: #ef4444; }
        .total-tracker.success { color: #10b981; }

        /* Goals Input */
        .goals-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .goal-label { display: flex; align-items: center; gap: 5px; background: #fdf6e3; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border-color); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .goal-label:hover { background: #f0e6d2; }
        .goal-label input { accent-color: var(--primary); transform: scale(1.2); }

        /* Calculation Result */
        .calc-result { text-align: center; font-size: 1.5rem; font-weight: bold; margin: 20px 0; padding: 15px; background: #fff5f2; border-radius: 8px; color: var(--primary); }
        
        /* Add to Player */
        .player-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn-player { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-player:hover { background: var(--primary-hover); }
        .btn-player:disabled { background: #a3a3a3; cursor: not-allowed; }

        /* Scoreboard */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; }
        th, td { border: 1px solid var(--border-color); padding: 10px; }
        th { background: #fdf6e3; color: var(--primary); }
        .total-row { font-weight: bold; background: #fff5f2; font-size: 1.1rem; }
        .winner { color: #ef4444; font-weight: bold; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦙 라마 라마 점수 계산기</h1>
        
        <!-- 손패 입력 -->
        <div class="section">
            <div class="section-title">1. 내 손패 (정확히 7장)</div>
            <div class="hand-grid">
                <script>
                    const cards = ['A','B','C','D','E','F','G'];
                    cards.forEach(c => {
                        document.write(`
                            <div class="card-counter">
                                <div class="card-name">${c}</div>
                                <div class="controls">
                                    <button class="btn-ctrl" onclick="adj('${c}', -1)">-</button>
                                    <span class="count-val" id="cnt-${c}">0</span>
                                    <button class="btn-ctrl" onclick="adj('${c}', 1)">+</button>
                                </div>
                            </div>
                        `);
                    });
                </script>
            </div>
            <div class="total-tracker error" id="total-tracker">현재 선택된 카드: 0장 / 7장</div>
        </div>

        <!-- 목표 카드 선택 -->
        <div class="section">
            <div class="section-title">2. 이번 라운드 목표 카드 (공개된 카드 선택)</div>
            <div class="goals-grid">
                <script>
                    cards.forEach(c => {
                        document.write(`
                            <label class="goal-label">
                                <input type="checkbox" class="goal-cb" value="${c}" onchange="updateCalc()"> ${c} 카드
                            </label>
                        `);
                    });
                </script>
            </div>
        </div>

        <!-- 결과 및 기록 -->
        <div class="section">
            <div class="section-title">3. 점수 계산 및 기록</div>
            <div class="calc-result">현재 조합 점수: <span id="current-score">0</span>점</div>
            
            <div class="player-actions">
                <button class="btn-player" id="btn-p1" onclick="addScore(1)" disabled>P1 점수 기록</button>
                <button class="btn-player" id="btn-p2" onclick="addScore(2)" disabled>P2 점수 기록</button>
                <button class="btn-player" id="btn-p3" onclick="addScore(3)" disabled>P3 점수 기록</button>
                <button class="btn-player" id="btn-p4" onclick="addScore(4)" disabled>P4 점수 기록</button>
            </div>
        </div>

        <!-- 점수판 -->
        <div class="section">
            <div class="section-title">📊 전체 점수판 (100점 이상 종료)</div>
            <table id="score-table">
                <tr>
                    <th>라운드</th>
                    <th>Player 1</th>
                    <th>Player 2</th>
                    <th>Player 3</th>
                    <th>Player 4</th>
                </tr>
                <!-- JS에서 생성 -->
            </table>
        </div>
    </div>

    <script>
        let hand = { A:0, B:0, C:0, D:0, E:0, F:0, G:0 };
        let scores = {
            1: [0, 0, 0, 0],
            2: [0, 0, 0, 0],
            3: [0, 0, 0, 0],
            4: [0, 0, 0, 0]
        };
        let currentRound = { 1:0, 2:0, 3:0, 4:0 }; // 각 플레이어의 진행 라운드

        function adj(card, val) {
            let currentTotal = Object.values(hand).reduce((a,b) => a+b, 0);
            if (val > 0 && currentTotal >= 7) return; // 7장 초과 방지
            if (val < 0 && hand[card] <= 0) return; // 0 미만 방지
            
            hand[card] += val;
            document.getElementById(`cnt-${card}`).innerText = hand[card];
            
            updateCalc();
        }

        function updateCalc() {
            let total = Object.values(hand).reduce((a,b) => a+b, 0);
            let tracker = document.getElementById('total-tracker');
            tracker.innerText = `현재 선택된 카드: ${total}장 / 7장`;
            
            let isReady = total === 7;
            if (isReady) {
                tracker.className = 'total-tracker success';
                tracker.innerText += ' (계산 가능!)';
            } else {
                tracker.className = 'total-tracker error';
                tracker.innerText += ' (7장을 맞춰주세요)';
            }

            // Calculate Score
            let score = 0;
            if (isReady) {
                const goals = Array.from(document.querySelectorAll('.goal-cb:checked')).map(cb => cb.value);
                const h = hand;

                if (goals.includes('A')) {
                    score += h.A * 1;
                    if (h.A>=1 && h.B>=1 && h.C>=1 && h.D>=1 && h.E>=1 && h.F>=1 && h.G>=1) score += 50;
                }
                if (goals.includes('B')) {
                    score += h.B * 2;
                    score += Math.floor(Math.min(h.A/2, h.C/2)) * 15;
                }
                if (goals.includes('C')) {
                    score += h.C * 3;
                    score += Math.floor(Math.min(h.A/2, h.B/2)) * 10;
                }
                if (goals.includes('D')) {
                    score += h.D * 4;
                    score += Math.min(h.A, h.G) * 5;
                    score += Math.min(h.C, h.E) * 5;
                    score += Math.min(h.B, h.F) * 5;
                }
                if (goals.includes('E')) {
                    score += h.E * 5;
                    // B, B, D, D (B 2장, D 2장)
                    score += Math.floor(Math.min(h.B/2, h.D/2)) * 20;
                }
                if (goals.includes('F')) {
                    score += h.F * 6;
                    score += Math.floor(h.A/6) * 30;
                }
                if (goals.includes('G')) {
                    score += Math.floor(h.A/2) * 7;
                    score += Math.min(h.A, h.B, h.C, h.D, h.E, h.F) * 30;
                }
            }
            
            document.getElementById('current-score').innerText = score;

            // 버튼 활성화
            for (let i=1; i<=4; i++) {
                // 이미 4라운드까지 기록했으면 비활성화
                document.getElementById(`btn-p${i}`).disabled = !isReady || currentRound[i] >= 4;
            }
        }

        function addScore(player) {
            let score = parseInt(document.getElementById('current-score').innerText);
            let r = currentRound[player];
            if (r < 4) {
                scores[player][r] = score;
                currentRound[player]++;
                renderTable();
                
                // 점수 초기화
                hand = { A:0, B:0, C:0, D:0, E:0, F:0, G:0 };
                cards.forEach(c => document.getElementById(`cnt-${c}`).innerText = 0);
                document.querySelectorAll('.goal-cb').forEach(cb => cb.checked = false);
                updateCalc();
            }
        }

        function renderTable() {
            let table = document.getElementById('score-table');
            // Header 보존
            let html = `
                <tr>
                    <th>라운드</th>
                    <th>Player 1</th>
                    <th>Player 2</th>
                    <th>Player 3</th>
                    <th>Player 4</th>
                </tr>
            `;
            
            let totals = {1:0, 2:0, 3:0, 4:0};

            for (let r=0; r<4; r++) {
                html += `<tr><td>${r+1} 라운드</td>`;
                for (let p=1; p<=4; p++) {
                    let s = scores[p][r];
                    totals[p] += s;
                    html += `<td>${currentRound[p] > r ? s : '-'}</td>`;
                }
                html += `</tr>`;
            }

            html += `<tr class="total-row"><td>총점</td>`;
            for (let p=1; p<=4; p++) {
                let isWinner = totals[p] >= 100 ? ' winner' : '';
                html += `<td class="${isWinner}">${totals[p]}</td>`;
            }
            html += `</tr>`;
            
            table.innerHTML = html;

            // 100점 이상 체크
            if (Object.values(totals).some(t => t >= 100)) {
                setTimeout(() => alert("🎉 누적 100점 이상 플레이어가 발생하여 게임이 종료되었습니다!"), 100);
            }
        }

        renderTable();
    </script>
</body>
</html>
